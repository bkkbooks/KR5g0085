front:
  text: 盤天經笙二高明上覆日月星辰沉潛下載風雨龍神
  hash: sha256:ebf903f4cf6469dab4a3b9390d546329d4101a891d0e1c4bffee5be8dc2d7a12
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0085_HFL_000-001a, image: hfl/1004/1004-036.png}
body:
  text: 夫高明者天也性雖至剛而有柔克謂能行健不息運三光而照臨下土也君尊象天當以柔克而納賢直之言詧百揆而撫萬民也沉潛者地也性雖至柔而有剛克謂能興雲雨調四時成百實産金石也臣象地當以剛克揆文武均賞罰勸諸侯法五常正三綱也是為三才之象天垂七曜曆數之本無違地出五雲升降之元長定君王修德則五嶽不差將相謙和則四時成序上下一而時雨降天地交而萬物亨也占斗光之明暗分月色之初新魁畔黑雲見霑滋於當夜罡前黄炁知潤澤於來辰魁乃斗也若黑雲犯斗半夜雨作黄炁蔽罡明朝潤行此候斗之徵也徧掩映於三日獨溟濛而半旬星黑炁冲斗三丈餘而色潤者三日内必雨無雨則主有憂大人不安也一望四郊皆無雲翳惟斗中上下獨有雲炁濛濛覆而潤者後五日必雨如雲黑低濃下廣布四厚者即當夜雨至也戊子六龍若魚行而大灑雲若魚行戊癸生主子遁乖而化火水一土五故曰六龍夜斗中間旦日上下若有蒼潤色雲如魚遊必主粗灑雲多雨之兆也斗間五象如龜動以長津旦日夜斗斗居中天以主四極其類為五色緫四方故曰五象夜斗間旦日下若有五色祥雲似龜動形而蒼潤者必主粗雨若黑雲蔽滿則為多雨也類南天兮炎火同中嶽兮飄塵夜觀斗中間赤雲黄炁蔽者當大熱殺人若是黄雲濛蔽及日月上下或不甚密者多風塵之象南天之色赤中嶽之色黄故以類之𩲃白雲而大遭風雨斗白炁掩斗而廣布者必有大風惡雨節丹霞而甚益農人節候四季八節六候之日旦暮雲霞四出者主此月多雨甲日晴空一旬竭定雲炁東出五行逐回六甲日候上下若無雲翳則一旬多晴有青雲甲乙雨有赤雲丙丁雨黄雲戊己日雨白雲庚辛日雨黑雲壬癸日雨隨色候雨故曰五行逐回五卯同木四方之象同因六甲從蒼諸干之形定變六甲同五卯日占與六甲日同若是旦掩日主當日雨多暮掩日者則當夜雨少也紫烏白兔降未升而雨霑日月開光纂曰天炁既降地炁未升厚則日紫薄則日赤於月則白此為將雨之候若遊炁蔽天日月失色者雨信也素日丹蟾升未降而災煽地炁升天炁未降厚則日黄薄則日白於月則赤乃旱之兆赤少雨多露之象也陽碧陰緑未交兮景色將寒天炁既降地炁未升上下未交晝則日青夜則月緑乃將寒之候此天地之變徵也奇黑偶青未密兮而虹霓或見二炁升降上下雖交而炁未密晝則日黑夜則月青將雨不雨主必變霾霧或為暈皆虹霓之屬奇陽為日偶陰為月若乃重占卯日雲聚中央景色寒冽大風木折四方五卯日雲聚中央景色寒冽大風木折四方昏翳隨雲多少驗之多即大風頻至如黑雲多壬癸日有雨電瀉須頻無則别生灾沴兵攅必急有之則更起災殃凡遇卯日如前天色微變而後無雨者必别生災沴定兵起急變之事應在五日内也斷五音之宫羽子午日為宫卯酉日為羽辰戌為商己亥為角丑未寅申徵納音則水羽土宫金商木角火徵也若羽日宫風宫日羽風皆至有雨或壬辰癸巳及壬戌癸亥等日卯時風暴或卯酉上來潤炁兼之主有大水百川决溢溝瀆盈滿如風勢叫怒者即主刑殺相會水中賊起之事宜加審若徵日風時加丑未寅申必主火灾角日風時加巳亥必主死喪灾病商日風時加辰戌必主兵起陽日主外陰日主内也裁六意之柔剛凡風雨失時者須詳六情以决其事寅午廉貞主慶事懽樂巳酉寬大主使客和好亥未公主執仇見喜忻悅申子貪狼主侵財奪貨竊盗卒起亥卯陰主劫賊傷切害辰未奸邪主好人入國非淫相殺其風清不寒則事淺若昏濁激觸破屋折樹則禍重也壬子至丁高燥則龍藏計候朝雲蔽日低濃則雨遍諸鄉壬子至丁巳凡六日所管各從三日壬子管戊午己未庚申癸丑管辛酉壬戌癸亥甲寅管甲子乙丑丙寅乙卯管丁卯戊辰己巳丙辰管庚午辛未壬申丁己管癸酉甲戌乙亥六日次第推測其主日雲炁低濃則所管從日亥多雨高燥則多旱又隨地分而占望之九州分野在後可詳察丙子起之辛巳行盡一日主占六辰詳認與前法同但一主日管五從日也如丙子管壬午癸未甲申乙酉丙戌之類詳注于後連窺天漢蛇衝而霧集雲屯累顧銀河猪越而風調雨順天河六甲五卯日天河有雲如蛇或猪狀往來者主有雨若黑罷而復興者主風雨順時也無雲掩映當旬之草木不滋有潤經過見則田園益潤天河六甲五卯日及壬癸丙丁水火二限之辰有黑雲潤炁渡河者不主是何形皆主有雨無則旬輕爽黑牛夜半如龍在震以辰期青龍旦前似馬當離而午位日色上下常以癸丑日夜半屬甲寅日辰前及於甲寅日平旦東方雲有象如龍則辰日雨如馬則午日雨餘倣此以類推之月初雨曜青炁潤明旬當數雨黄赤乾晴初一二三日出時看凡月初日月色帶青黑潤明者主月内多雨又占一日管上旬二日管中旬三日管下旬如色赤黄乾枯月内多旱也旦候孤光雲帶中央而不動日高三丈雨施四面以頻行日出凡日高三丈以來有雲如帶長引貫日而潤者名為陰蔽陽主多雨之象或旦黑白雲帶潤為積陰也晨辨東方積土之形便瀉暮窺酉上累蓋之象尋傾旦視東方有雲如積土之形色及如累蓋之狀作層而起者主尋時有雨或落在己酉庚戌暮覘亦然凡雲積聚日傍上下起者為雨之兆也色象北方雲多黄黑炁運南行雨多玄則旦視北方有雲黄潤厚如二里許大小南行者主壬癸日雨蓋壬癸之色黑故曰玄則躍躍猪狀山奔而七子之裁蔚蔚離風乾受以八表之測旦日出時有黑霧雲如猪狀者主雨子日時必雨數當也故曰七子之裁或北雲蔚南容蒼蒼兼有南風其雲回北者後八日内必雨若西南行者主便雨不然則旱露之相北行則當日必有雨惟黑霧掩日者必雨雲帶横列寅卯爲甲乙之名日輪所當辰巳爲丙丁之澤凡有陰精雲帶或白或黑在寅卯時或寅卯方上者甲乙日雨若在辰巳日及方上者丙丁日雨或陰精雲帶有潤炁隨之者其時立有雨也午未見戊己以無差坤申行雲庚辛而不忒雲帶在午未上及午未日時者主戊己日雨坤申時者主庚辛日雨其或酉戌上及日入時見者丁癸日必雨也若當灾旱觀象入於天河或遇淋淫見星繁於漢陌天漢及奎角二宿之散其本日水一名天河夜見漢中星繁則主雨星少則為旱雷電六星在室西南若明動則主雷電霹靂雲雨四星在室東南方明動則多雨也五色交雜赤黑相兼天威雹凍神怒雲𩅼旦有雲炁五色交錯或赤黑相兼者及天之威怒必有雹凍也𩅼者有災言雲𩅼小而不濡物神不敬也凡旺相之日降雨者為長生萬物囚死日降雨者為殺伐萬物也漫灑輕吹遠邇兮尊王敬愛迅飄傾注高低兮逆主情猜凡微雨漫風不損禾苗者乃人情吹化上下同心之兆也若急雨惡風轉觸崩騰平地水高漂蕩人物者惡人謀逆也君正臣忠後雨先風而詳察上驕下諂始雨終風而禍占感情符曰風為陽物配之於君雨為陰物配之為臣凡風先後雨者為禎為祥乃君正臣忠之象先雨後風者乃上慢下暴之象也若止雲雨而無風者雨為陽物雲為陰物凡雨後便晴者德化流行君臣和睦之象若止後猶有雲炁蔽天不散者政令乖違上下不和之象也若夜沉而晝舒晴明者為君正臣忠上律下恭之象也晝沉而夜晴明者為臣逆君下圖上之象晝夜俱沉者乃上下相謀之象也鎮逆入河法令急而淋澇熒回犯木政理乖而旱災犯奎角之星天官之書曰土星逆行入河中主天下大水法令嚴急或流入津者亦為渡水溺之相火星逆行犯守木星主災旱入河主天下大旱貴人有災火星犯木為滋墨乃君過愆之所致也歲月日時精靈攅聚掩迫關係神祇相遇歲月日時占法太乙主十二月有掩迫關係四時開生十精併聚之日且有黑雲濃潤掩日者當日必雨青雲甲乙雨赤雲丙丁日雨又青主寅卯日時雨白主申酉日時雨也一曰天皇申子辰三甲旬首年月日時起武順行十二辰四隅重留二曰帝符申子辰三甲旬前起陰主順行十二辰四隅重留三曰天時五子並起占甲順行十二辰周而復始四曰天行事甲子辰月日起八宫逆行六二四周而復始五曰飛烏上元甲子起一中元甲子起七下元甲子起四皆少至多行九宫周而復始六曰天乙上元甲子起八中元甲子起六下元甲子起九皆少至多行八宫周而復始七曰八風上元甲子起二中元甲子起八下元甲子起五九宫周而復始八曰五風上元甲子起一中元甲子起四下元甲子起七皆少至多越一位行九宫周而復始四位加變朝中夕半以興雲太衝勝光從魁神后凡四仲年月日時皆太乙移宫之日每移宫之時有雲掩日青黑潤者必雨朝卯中午夕酉夜半子時凡雲起濃潤則有雨彗掃日則多風薄微則多主晴若乾黄赤炁多旱也六壬發傳龍水干支以致雨軒轅氏六壬占經常以月符加月建及月朔見神后下為大雨大冲下為小雨日又以六甲旬天上壬癸下為雨日又以大吉加月朔神后下為大雨大冲下為小雨凡起雲起以月將加正時上見登明神后功曹大冲為大雨青龍六合天后玄武雲吟為小雨金土神后螣蛇白虎臨時日者為大風雨太乙勝光朱雀螣蛇臨日辰為必晴凡有雨不晴者以日符加月建及月朔見太乙勝光臨日辰及天上丙丁為晴日也日辰則春辰夏未秋戌冬丑日符則甲寅乙卯丙辰丁巳戊午庚申辛酉壬子癸亥是也日辰兩位非其所以無多宫宿十精是本方而徧溥神樞靈轄經云甲為齊魯分乙為東夷分丙為吴越分丁為楚蠻戊為鄭陳己為魏蔡庚為晋衛辛為秦蜀壬為燕韓癸為趙魏分子為韓分齊青丑為翟衛吴楊寅為趙楚漢燕幽卯為鄭豫辰為邯鄲鄭兖巳為衛郡荆楚午為秦西京周三河未為梁楚山秦雍申為齊晋魏分晋益酉為魯分趙翼戌為趙分魯齊亥為燕代衛并此乃九州分野雲炁此法占日辰支干年月日時皆有法八節冬至起少至九多夏至後起九多至一少此五日一移宫一宫主雨冀州趙州主霰荆州漢楚分三宫主風雷青州齊分四宫主淋淫徐州魯分五宫主蟲災豫州宋分六宫主霜雹雍州秦分七宫主霾霧梁州晋分八宫主雲兖州鄭分九宫主災火揚州吴分今人號九州右法冬至起甲子順飛八宫夏至後中宫起甲子逆飛金水出入起風霧以連天畢月相逢布雲雷於下土金水二星躔箕畢金水出入主有風雨月會箕多風會畢則多雨所謂多風多雨也銅雀屏炁池枯而徵烏翅張石燕翔空川溢而商羊鼓舞感情符歲旱澇不熟則銅雀韜青蚍䗮蛇四翼名微烏見處有三年天旱識者多種大麥以防飢謂大麥奈旱也歲將豐則商羊鼓舞所謂天將雨商羊舞是也水馬亦名石燕飛則主多雨之兆載君之德五徵不亂以迎新謂相之賢十義無虧而效證日月盈昃各有常度功理大小各有常法所以治成而化通五徵未備風以動物雨以潤物燠以長物陽以化物寒以成物五徵備而休咎明正與君能聖治則風雨順之如有濛暗則將風順之君能昭敬則時雨順之如乃狂望則將雨順之君能明哲則時暘順之如有僣差則將暘順之君能謀慮則時寒順之謂各依其時者為休徵也昔舜禪禹卑宫室而盡力乎溝洫以安百姓故八風遁用五徵不差如昔殷紂之君不敬上天降灾下民沉湎冒色罪人以族官人以世為宫室臺榭陂池侈服以殘害萬姓焚炙忠良刳剔孕婦皇天震怒亂禍四起霖雨不時冬温夏寒五徵皆錯此天助武王滅殷之象也禮運喜怒憂懼愛惡欲七者不學而能乃人之情也父慈子孝兄友弟恭夫義婦敬君仁臣忠師嚴友信十者學而後全乃人之義也所以敦情義興信睦行辭讓去爭奪惟聖人者能之尊天貴地惟妙法以推成鬼重神欽結玄機而完備明陰陽關節之數建玄機運行之圖尋其義也皆先聖之遺文究彼情焉從後賢之初貫通天地之玄號風雲之賦盤天經
